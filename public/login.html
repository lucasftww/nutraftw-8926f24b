<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Entrar — GIMPORTS</title>
    <link rel="icon" type="image/webp" href="/logo-gimports.webp" />
    <script src="https://cdn.tailwindcss.com"></script>
<link href="/css/base-fonts.css" rel="stylesheet" />
    <link rel="stylesheet" href="/KA%20Imports_files/index-CBB5XBVF.css" />
    <link rel="stylesheet" href="/css/gimports-brand.css" />
  </head>
  <body>
    <div class="min-h-screen bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 flex items-center justify-center px-4 py-10">
      <div class="w-full max-w-md bg-white border border-border rounded-3xl shadow-xl p-7 sm:p-8">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-bold text-foreground">Entrar na sua conta</h1>
          <p class="text-sm text-muted-foreground mt-1">Acompanhe os seus pedidos com segurança.</p>
        </div>

        <div class="grid grid-cols-2 gap-2 mb-6 p-1 bg-muted rounded-xl">
          <button
            type="button"
            id="tab-login"
            class="h-10 rounded-lg text-sm font-semibold transition-colors bg-white text-foreground shadow-sm"
          >
            Entrar
          </button>
          <button
            type="button"
            id="tab-register"
            class="h-10 rounded-lg text-sm font-semibold transition-colors text-muted-foreground"
          >
            Criar conta
          </button>
        </div>

        <p id="err-login" class="hidden mb-4 rounded-xl border border-destructive/40 bg-destructive/10 px-3 py-2 text-sm text-destructive"></p>
        <p id="err-register" class="hidden mb-4 rounded-xl border border-destructive/40 bg-destructive/10 px-3 py-2 text-sm text-destructive"></p>

        <form id="form-login" class="space-y-4" autocomplete="on">
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-foreground" for="email-login">E-mail</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" aria-hidden="true"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
              <input
                id="email-login"
                name="email"
                placeholder="voce@email.com"
                autocomplete="email"
                class="w-full h-11 pl-9 pr-3 rounded-xl border border-input bg-white text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary"
                type="email"
                required
              />
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-foreground" for="pass-login">Senha</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input
                id="pass-login"
                name="password"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                class="w-full h-11 pl-9 pr-3 rounded-xl border border-input bg-white text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary"
                type="password"
                required
              />
            </div>
          </div>
          <button
            type="submit"
            class="inline-flex items-center justify-center transition-all duration-300 ease-out active:scale-95 bg-gradient-to-r from-primary to-primary/90 text-primary-foreground shadow-lg shadow-primary/25 hover:shadow-xl border border-primary/20 px-6 font-medium w-full h-11 rounded-xl"
          >
            Entrar
          </button>
        </form>

        <form id="form-register" class="space-y-4 hidden" autocomplete="on">
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-foreground" for="email-register">E-mail</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" aria-hidden="true"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
              <input
                id="email-register"
                name="email"
                placeholder="voce@email.com"
                autocomplete="email"
                class="w-full h-11 pl-9 pr-3 rounded-xl border border-input bg-white text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary"
                type="email"
                required
              />
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-foreground" for="pass-register">Senha</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input
                id="pass-register"
                name="password"
                placeholder="Mínimo 8 caracteres"
                autocomplete="new-password"
                class="w-full h-11 pl-9 pr-3 rounded-xl border border-input bg-white text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary"
                type="password"
                required
                minlength="8"
              />
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="text-sm font-medium text-foreground" for="pass-register2">Confirmar senha</label>
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              <input
                id="pass-register2"
                name="password2"
                placeholder="Repita a senha"
                autocomplete="new-password"
                class="w-full h-11 pl-9 pr-3 rounded-xl border border-input bg-white text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary/20 focus-visible:border-primary"
                type="password"
                required
                minlength="8"
              />
            </div>
          </div>
          <button
            type="submit"
            class="inline-flex items-center justify-center transition-all duration-300 ease-out active:scale-95 bg-gradient-to-r from-primary to-primary/90 text-primary-foreground shadow-lg shadow-primary/25 hover:shadow-xl border border-primary/20 px-6 font-medium w-full h-11 rounded-xl"
          >
            Criar conta
          </button>
        </form>

        <div class="text-center mt-6 space-y-2">
          <a href="/" class="text-sm text-muted-foreground hover:text-foreground transition-colors block">Voltar para a loja</a>
          <a href="/admin" class="text-xs text-muted-foreground hover:text-primary transition-colors block">Acesso à administração</a>
        </div>
      </div>
    </div>
    <script type="module" src="/js/login.js"></script>
  </body>
</html>

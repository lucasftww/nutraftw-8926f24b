<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="rv-navy" x1="8" y1="8" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F6B"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="rv-cyan" x1="6" y1="50" x2="60" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FA8D8"/>
      <stop offset="1" stop-color="#7FE0F5"/>
    </linearGradient>
    <radialGradient id="rv-shield" cx="32" cy="30" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E3A8A" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0B1F6B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- subtle shield halo -->
  <circle cx="32" cy="32" r="30" fill="url(#rv-shield)"/>
  <!-- R: hasta vertical + bojo + perna diagonal, todos com stroke-linecap round -->
  <path
    d="M14 50 L14 12 L26 12 a8 8 0 0 1 0 16 L18 28"
    stroke="url(#rv-navy)" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path
    d="M22 28 L30 50"
    stroke="url(#rv-navy)" stroke-width="5"
    stroke-linecap="round" fill="none"/>
  <!-- V -->
  <path
    d="M36 12 L46 46 L56 12"
    stroke="url(#rv-navy)" stroke-width="5"
    stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Crescent swoosh — assinatura visual -->
  <path
    d="M8 44 Q 32 62 60 28"
    stroke="url(#rv-cyan)" stroke-width="3.5"
    stroke-linecap="round" fill="none" opacity="0.92"/>
  <!-- Sparkle -->
  <path
    d="M28 18 L29.2 20.8 L32 22 L29.2 23.2 L28 26 L26.8 23.2 L24 22 L26.8 20.8 Z"
    fill="url(#rv-cyan)"/>
</svg>
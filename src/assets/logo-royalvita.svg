<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="rv-grad" x1="6" y1="8" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F6B"/>
      <stop offset="0.55" stop-color="#1E63C8"/>

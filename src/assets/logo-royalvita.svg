<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="rv-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F6B"/>
      <stop offset="1" stop-color="#15307F"/>
    </linearGradient>
  </defs>
  <!-- Squircle navy: símbolo forte, app-ready -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#rv-bg)"/>
  <!-- Monograma RV moderno em branco, geométrico, traço uniforme -->
  <g stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- R: hasta + bojo + perna -->
    <path d="M16 46 L16 18 L26 18 a7 7 0 0 1 0 14 L20 32"/>
    <path d="M24 32 L30 46"/>
    <!-- V -->
    <path d="M34 18 L42 46 L50 18"/>
  </g>
  <!-- Accent ciano: ponto-assinatura discreto -->
  <circle cx="50" cy="18" r="3" fill="#3FC1E5"/>
</svg>